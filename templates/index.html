<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Speech-to-Text</title>
    <!-- Modern Typography: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --surface-color: rgba(255, 255, 255, 0.05);
            --primary: #45f3ff;
            --primary-glow: rgba(69, 243, 255, 0.4);
            --secondary: #ff3c78;
            --text-main: #ffffff;
            --text-muted: #8892b0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(69, 243, 255, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 60, 120, 0.15), transparent 25%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 650px;
            padding: 40px;
            background: var(--surface-color);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1.1rem;
            font-weight: 300;
        }

        .upload-area {
            position: relative;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 50px 20px;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.2);
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(69, 243, 255, 0.05);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .upload-area input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 15px;
            display: inline-block;
            transition: transform 0.3s ease;
        }
        
        .upload-area:hover .upload-icon {
            transform: translateY(-5px);
        }

        .file-name {
            display: block;
            margin-top: 15px;
            font-weight: 600;
            color: var(--primary);
        }

        button.process-btn {
            background: linear-gradient(135deg, var(--primary), #00bbcc);
            color: #000;
            border: none;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px var(--primary-glow);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
        }

        button.process-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px var(--primary-glow);
        }
        
        button.process-btn:disabled {
            background: var(--surface-color);
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
            transform: translateY(0);
        }

        .result-container {
            margin-top: 30px;
            text-align: left;
            display: none;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .result-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .result-label::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--secondary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--secondary);
        }

        .result-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e2e8f0;
            min-height: 80px;
        }

        .error-message {
            color: var(--secondary);
            margin-top: 15px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top: 3px solid #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        button.record-btn {
            background: rgba(255, 60, 120, 0.1);
            color: var(--secondary);
            border: 1px solid var(--secondary);
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
            margin-bottom: 20px;
        }

        button.record-btn:hover {
            background: rgba(255, 60, 120, 0.2);
            box-shadow: 0 5px 15px rgba(255, 60, 120, 0.3);
        }

        button.record-btn.recording {
            background: var(--secondary);
            color: #fff;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 60, 120, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 60, 120, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 60, 120, 0); }
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>VoiceToText AI</h1>
        <p class="subtitle">Powered by Facebook S2T Architecture</p>

        <div class="upload-area" id="dropZone">
            <input type="file" id="audioFile" accept="audio/*, video/mpeg" onchange="handleFileSelect()">
            <span class="upload-icon">🎙️</span>
            <div>Drag & Drop your audio file here</div>
            <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 5px;">MPEG, WAV, FLAC, MP3 supported</div>
            <span class="file-name" id="fileNameDisplay"></span>
            <audio id="audioPreview" controls style="display: none; width: 100%; margin-top: 15px; border-radius: 8px; outline: none;"></audio>
        </div>

        <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
            <span class="record-icon">🔴</span>
            <span class="record-text">Record Audio</span>
        </button>

        <button class="process-btn" id="transcribeBtn" onclick="transcribeAudio()" disabled>
            <span class="btn-text">Extract Transcription</span>
            <div class="spinner" id="loadingSpinner"></div>
        </button>
        
        <div id="errorText" class="error-message"></div>

        <div class="result-container" id="resultContainer">
            <div class="result-label">Generated Output</div>
            <div class="result-box" id="resultText"></div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('audioFile');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const audioPreview = document.getElementById('audioPreview');
        const transcribeBtn = document.getElementById('transcribeBtn');
        const btnText = document.querySelector('.btn-text');
        const spinner = document.getElementById('loadingSpinner');
        const resultContainer = document.getElementById('resultContainer');
        const resultText = document.getElementById('resultText');
        const errorText = document.getElementById('errorText');
        const recordBtn = document.getElementById('recordBtn');
        const recordText = document.querySelector('.record-text');
        
        let mediaRecorder;
        let audioChunks = [];
        let recordedBlob = null;
        let isRecording = false;

        async function toggleRecording() {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = event => {
                        if (event.data.size > 0) {
                            audioChunks.push(event.data);
                        }
                    };

                    mediaRecorder.onstop = () => {
                        recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const fileURL = URL.createObjectURL(recordedBlob);
                        
                        fileInput.value = '';
                        fileNameDisplay.textContent = "Recorded Audio";
                        
                        audioPreview.src = fileURL;
                        audioPreview.style.display = "block";
                        
                        transcribeBtn.disabled = false;
                        errorText.textContent = "";
                        resultContainer.style.display = "none";
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    recordBtn.classList.add('recording');
                    recordText.textContent = "Stop Recording";
                } catch (err) {
                    errorText.textContent = "Microphone access denied or unavailable.";
                    console.error(err);
                }
            } else {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                isRecording = false;
                recordBtn.classList.remove('recording');
                recordText.textContent = "Record Audio";
            }
        }

        // Drag and Drop Effects
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', (e) => {
            fileInput.files = e.dataTransfer.files;
            handleFileSelect();
        });

        function handleFileSelect() {
            if (fileInput.files.length > 0) {
                recordedBlob = null;
                const file = fileInput.files[0];
                fileNameDisplay.textContent = file.name;
                
                const fileURL = URL.createObjectURL(file);
                audioPreview.src = fileURL;
                audioPreview.style.display = "block";
                
                transcribeBtn.disabled = false;
                errorText.textContent = "";
                resultContainer.style.display = "none";
            }
        }

        async function transcribeAudio() {
            if (fileInput.files.length === 0 && !recordedBlob) return;

            // UI Loading State
            transcribeBtn.disabled = true;
            btnText.textContent = "Processing Audio...";
            spinner.style.display = "block";
            errorText.textContent = "";
            resultContainer.style.display = "none";

            const formData = new FormData();
            if (fileInput.files.length > 0) {
                formData.append("audio", fileInput.files[0]);
            } else if (recordedBlob) {
                formData.append("audio", recordedBlob, "recording.webm");
            }

            try {
                const response = await fetch("/predict", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();
                
                if (response.ok && data.success) {
                    resultText.textContent = data.transcription;
                    resultContainer.style.display = "block";
                } else {
                    errorText.textContent = "Error: " + (data.error || "Unknown server error");
                }
            } catch (error) {
                errorText.textContent = "Connection Error. Ensure the Flask server is running.";
                console.error(error);
            } finally {
                // UI Reset State
                transcribeBtn.disabled = false;
                btnText.textContent = "Extract Transcription";
                spinner.style.display = "none";
            }
        }
    </script>
</body>
</html>
